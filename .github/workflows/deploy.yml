name: Deploy — Cloudflare Pages (trust.rald.cloud)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Create Pages project (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages project create rald-trust --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy dist --project-name=rald-trust --branch=${{ github.ref_name }}

      - name: Register trust.rald.cloud custom domain (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages domain add rald-trust trust.rald.cloud \
            || echo "Domain already configured or pending DNS propagation"

      - name: Health check
        run: |
          echo "Waiting 20s for propagation..."
          sleep 20
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://trust.rald.cloud/ || echo "000")
          echo "trust.rald.cloud → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ trust.rald.cloud is live"
          else
            echo "⏳ DNS propagation may take a few minutes — check again shortly"
          fi
        continue-on-error: true
